<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a12"/>
  
  <!-- Rocket body -->
  <path d="M16 6C16 6 10 12 10 18C10 22 12 24 16 26C20 24 22 22 22 18C22 12 16 6 16 6Z" fill="url(#rocket-gradient)"/>
  
  <!-- Rocket window -->
  <circle cx="16" cy="16" r="3" fill="#0a0a12" opacity="0.8"/>
  <circle cx="16" cy="16" r="2.5" fill="url(#window-gradient)"/>
  
  <!-- Flame -->
  <path d="M14 24C14 24 15 28 16 30C17 28 18 24 18 24" fill="url(#flame-gradient)"/>
  
  <!-- Stars decoration -->
  <circle cx="6" cy="8" r="0.8" fill="#b794f6" opacity="0.6"/>
  <circle cx="26" cy="10" r="0.6" fill="#f687b3" opacity="0.5"/>
  <circle cx="24" cy="26" r="0.5" fill="#b794f6" opacity="0.4"/>
  
  <defs>
    <linearGradient id="rocket-gradient" x1="10" y1="6" x2="22" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    
    <linearGradient id="window-gradient" x1="14" y1="14" x2="18" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    
    <linearGradient id="flame-gradient" x1="14" y1="24" x2="18" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f687b3"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
